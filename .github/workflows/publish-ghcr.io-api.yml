name: ghcr.io publish API

on:
  workflow_dispatch:
  
env:
  REGISTRY: ghcr.io/gman-au/bottle-rocket-server
  IMAGE_NAME: bottle-rocket-server-api
  
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest    
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4      
        
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3       

      - name: Determine version tag
        id: version
        run: |
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
          [ "$VERSION" == "master" ] && VERSION=latest
          IMAGE_ID=$(echo ${{ env.IMAGE_NAME }} | tr '[A-Z]' '[a-z]')
          REGISTRY=${{ env.REGISTRY }}
          echo "tags=$REGISTRY/$IMAGE_ID:$VERSION,$REGISTRY/$IMAGE_ID:latest" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/Rocket.Api.Host/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.version.outputs.tags }}
          build-args: APP_VERSION=${{ github.ref_name }}